version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:7.0
    container_name: heart_disease_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: heart_disease_db
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heart_disease_network

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heart_disease_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://admin:admin123@mongodb:27017/heart_disease_db}
      API_KEY: ${API_KEY:-Heart_disease_api}
      TOKEN_SECRET: ${TOKEN_SECRET:-}
      TOKEN_TTL: ${TOKEN_TTL:-900}
      ALLOW_ALL_ORIGINS: ${ALLOW_ALL_ORIGINS:-true}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - heart_disease_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service
  frontend:
    build:
      context: ./web_frontend
      dockerfile: Dockerfile
    container_name: heart_disease_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - heart_disease_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  heart_disease_network:
    driver: bridge
